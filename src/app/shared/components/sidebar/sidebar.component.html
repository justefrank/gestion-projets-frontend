<aside class="sidebar">

  <!-- ── Logo ──────────────────────────────── -->
  <div class="sidebar-brand">
    <div class="brand-text">
      <span class="brand-name">Gestion</span>
      <span class="brand-accent">Projet</span>
    </div>
  </div>

  <!-- ── Séparateur ────────────────────────── -->
  <div class="sidebar-divider"></div>

  <!-- ── Label menu ────────────────────────── -->
  <div class="menu-label">NAVIGATION</div>

  <!-- ── Menu principal ────────────────────── -->
  <nav class="sidebar-nav">
    @for (item of menuItems; track item.route) {
      <a [routerLink]="item.route"
         routerLinkActive="active"
         class="nav-item"
         [matTooltip]="item.description"
         matTooltipPosition="right">
        <div class="nav-icon">
          <mat-icon>{{ item.icon }}</mat-icon>
        </div>
        <div class="nav-content">
          <span class="nav-label">{{ item.label }}</span>
          <span class="nav-desc">{{ item.description }}</span>
        </div>
        <div class="nav-indicator"></div>
      </a>
    }
  </nav>

  <!-- ── Bas de sidebar ────────────────────── -->
  <div class="sidebar-footer">
    <div class="sidebar-divider"></div>

    <div class="user-section">
      <div class="user-avatar">
        {{ (authService.currentUser$ | async)?.username?.charAt(0)?.toUpperCase() || 'U' }}
      </div>
      <div class="user-info">
        <span class="user-name">
          {{ (authService.currentUser$ | async)?.first_name || 'Utilisateur' }}
        </span>
        <span class="user-role">Membre</span>
      </div>
      <div class="online-dot"></div>
    </div>

  </div>

</aside>
